version: "3.9"

services:
  ironfit-postgis:
    image: postgis/postgis:16-3.4
    container_name: ironfit-postgis
    environment:
      POSTGRES_DB: ironfit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ironfit_postgis_data:/var/lib/postgresql/data

volumes:
  ironfit_postgis_data:
